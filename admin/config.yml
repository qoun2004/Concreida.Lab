backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"
locale: "zh_Hant"

collections:
  - name: "posts"
    label: "最新動態 / 文章"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "文章標題", name: "title", widget: "string" }
      - { label: "發布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - label: "分類"
        name: "category"
        widget: "select"
        options:
          - { label: "深度文章", value: "article" }
          - { label: "Maker 實錄", value: "maker" }
          - { label: "寂寞公路計劃", value: "highway" }
          - { label: "倉庫日常（寶妹）", value: "baomei" }
          - { label: "產品動態", value: "product" }
          - { label: "ESG 採購", value: "esg" }
          - { label: "循環經濟", value: "circular" }
          - { label: "活動預告", value: "event" }
      - { label: "封面圖片", name: "thumbnail", widget: "image", required: false }
      - { label: "文章摘要（顯示於列表）", name: "excerpt", widget: "text" }
      - { label: "文章內容", name: "body", widget: "markdown" }

  - name: "products"
    label: "產品系列"
    folder: "_products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "產品名稱", name: "title", widget: "string" }
      - label: "系列類型"
        name: "series"
        widget: "select"
        options:
          - { label: "Ready-made · 標準量產", value: "standard" }
          - { label: "Custom-made · 客製故事系列", value: "custom" }
      - { label: "產品圖片", name: "image", widget: "image", required: false }
      - { label: "產品標籤（如：旗艦作品）", name: "badge", widget: "string", required: false }
      - { label: "產品描述", name: "description", widget: "text" }
      - { label: "材料標籤", name: "materials", widget: "string" }
      - { label: "規格說明", name: "specs", widget: "string", required: false }

  - name: "settings"
    label: "網站基本設定"
    files:
      - label: "聯絡資訊"
        name: "contact"
        file: "_data/contact.yml"
        fields:
          - { label: "Email", name: "email", widget: "string" }
          - { label: "LINE 帳號", name: "line", widget: "string", required: false }
          - { label: "Instagram", name: "instagram", widget: "string", required: false }
          - { label: "Facebook", name: "facebook", widget: "string", required: false }
          - { label: "工作室地址", name: "address", widget: "string", required: false }
